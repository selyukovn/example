# Правила записи и оповещения находятся в группе правил.
# Правила внутри группы выполняются последовательно через равные промежутки времени с одинаковым временем оценки.

# Для ожидающих и срабатывающих оповещений Prometheus также сохраняет синтетические временные ряды вида
# ALERTS{alertname="<alert name>", alertstate="<pending or firing>", <additional alert labels>}.
# Значение выборки устанавливается = 1 до тех пор,
# пока оповещение находится в указанном активном (ожидающем или срабатывающем) состоянии,
# и ряд помечается как устаревший, когда это перестает быть так.

groups:
  - name: alerts
    rules:
      - alert: InstanceDown
        expr: up == 0

        # ... проверять, остается ли оповещение активным в течение for при каждой оценке, прежде чем оно сработает.
        # Элементы, которые активны, но еще не срабатывают, находятся в состоянии ожидания.
        # Правила оповещения без for активируются при первой оценке.
        #
        # for: 5m

        # ... продолжать отправку оповещения в течение времени после последнего выполнения условия срабатывания.
        # Это можно использовать для предотвращения нестабильные оповещения, ложные срабатывания из-за отсутствия потери данных и т. д.
        # Правила оповещения без keep_firing_for будут деактивированы при первой проверке, если условие не выполнено
        # (при условии, что любое из for описанных выше необязательных значений времени было выполнено).
        #
        # keep_firing_for: 5m

        # ... набор информационных меток, которые можно использовать для хранения более длинной дополнительной информации,
        # такой как описания предупреждений или ссылки на руководства по эксплуатации.
        # Значения аннотаций могут быть заданы с помощью шаблонов (основан на системе шаблонов Go).
        # https://prometheus.io/docs/prometheus/3.5/configuration/template_reference/
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} is down"
