# Блок маршрута определяет узел в дереве маршрутизации и его дочерние узлы.
# ... параметры конфигурации наследуются от родительского узла
#
# Каждое оповещение поступает в дерево маршрутизации по настроенному маршруту верхнего уровня,
# который должен соответствовать всем оповещениям (т.е. не иметь настроенных сопоставителей).
# Затем оно проходит через дочерние узлы.
# Если continue = false, оно останавливается после первого соответствующего дочернего узла.
# Если continue = true для соответствующего узла, оповещение продолжит сопоставление с последующими соседними узлами.
# Если оповещение не соответствует ни одному дочернему узлу (нет соответствующих дочерних узлов или их нет),
# обработка оповещения осуществляется на основе параметров конфигурации текущего узла.
route:
  receiver: default
  routes:
    - mute_time_intervals:
      - off-work
      - weekend

# ----

receivers:
  - name: default

# ----

time_intervals:
  - name: off-work
    time_intervals:
      - times:
        - start_time: "19:00"
          end_time: "23:59"
      - times:
        - start_time: "00:00"
          end_time: "10:00"

  - name: weekend
    time_intervals:
      - weekdays: ["saturday", "sunday"]
