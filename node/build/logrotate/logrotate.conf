
# https://man7.org/linux/man-pages/man8/logrotate.8.html

# ----------------------------------------------------------------------------------------------------------------------
# COMMON
# ----------------------------------------------------------------------------------------------------------------------

# Иначе logrotate выдает ошибку:
# "error: ... because parent directory has insecure permissions ... writable ... by ... not "root") ..."
# logrotate'у также нужны rw-права на файлы логов, а, например, php-fpm создает логи с правами 0500.
su root root

# Если не использовать copytruncate, логи продолжают писаться в "старый" файл, т.к. сервисы не знают о ротации.
# "... Note that there is a very small time slice between copying the file and truncating it,
# so some logging data might be lost. ..."
# https://man7.org/linux/man-pages/man8/logrotate.8.html
copytruncate

dateext

# ----------------------------------------------------------------------------------------------------------------------
# ADMIN / AUTH
# ----------------------------------------------------------------------------------------------------------------------

/app/admin/auth/grpc/app.log {
    # примерный демо-конфиг
    size 1M
    rotate 1
}

/app/admin/auth/sch/app.log {
    # примерный демо-конфиг
    size 1M
    rotate 1
}

# ----------------------------------------------------------------------------------------------------------------------
# ADMIN / GATEWAY
# ----------------------------------------------------------------------------------------------------------------------

/app/admin/gateway/http/app.log {
    # примерный демо-конфиг
    size 1M
    rotate 1
}

# ----------------------------------------------------------------------------------------------------------------------
# ADMIN / CFM
# ----------------------------------------------------------------------------------------------------------------------

/app/admin/cfm/grpc/app.log {
