
# ----------------------------------------------------------------------------------------------------------------------
# TYPE  DATABASE        USER                                ADDRESS                 METHOD
# ----------------------------------------------------------------------------------------------------------------------

# Доступ через unix-сокет требуется для выполнения инициализации.
# Также имеет смысл иметь такой доступ для подключения изнутри контейнера через терминал.
local   all             postgres                                                    scram-sha-256

# Специальные пользователи проекта из подсети докера.
# Конкретные бд не указываются -- доступ контролируется привилегиями.
host    all             prometheus_exporter                 172.16.0.0/12           scram-sha-256

# ----------------------------------------------------------------------------------------------------------------------
# Внимание!
# TODO : доступ от имени `postgres` из подсети докера нужен для подключения IDE через проброшенный порт.
# Это (а в mysql, кстати, есть 'root@%') не должно быть прописано здесь в таком виде.
# Нужно найти другой способ.
host    all             postgres                            172.16.0.0/12           scram-sha-256
