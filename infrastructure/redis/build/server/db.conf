# https://redis.io/docs/latest/operate/oss_and_stack/management/config/
# https://raw.githubusercontent.com/redis/redis/8.4/redis.conf

dir "/data"
bind 0.0.0.0
protected-mode yes
timeout 0

daemonize no
loglevel notice
logfile "/data/redis.log"
hide-user-data-from-log yes

# см. launcher.sh
aclfile "/data/acl"

# ----------------------------------------------------------------------------------------------------------------------

# В режиме RDB + AOF восстановление после перезапуска будет выполняться по AOF-файлам из-за минимально возможных потерь.
# RDB призван делать backup'ы.
# В данном проекте частота создания backup'ов и перезаписи AOF-файлов увеличена для наглядности.
save 60 10
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 1kb
appenddirname "."
# сначала нужно посмотреть, можно ли восстановить вручную.
aof-load-truncated no

# ----------------------------------------------------------------------------------------------------------------------
