# https://redis.io/docs/latest/operate/oss_and_stack/management/config/
# https://raw.githubusercontent.com/redis/redis/8.4/redis.conf

dir "/data"
bind 0.0.0.0
protected-mode yes
timeout 0

daemonize no
loglevel notice
logfile "/data/redis.log"
hide-user-data-from-log yes

# см. launcher.sh
aclfile "/data/acl"

# ----------------------------------------------------------------------------------------------------------------------

# Эти настройки для сервера, который используется исключительно как кеш.
save ""
appendonly no

# ----------------------------------------------------------------------------------------------------------------------
