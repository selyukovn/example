
# ----------------------------------------------------------------------------------------------------------------------
# MAIN
# ----------------------------------------------------------------------------------------------------------------------

pid /state/run/nginx.pid;

worker_processes  auto;      # из конфига по умолчанию

events {
    worker_connections 1024; # из конфига по умолчанию
}

# Переопределять нет смысла, т.к файл "error.log" все равно создается.
# Например, в случае кривых конфигов, ошибка запишется в "error.log".
error_log /var/log/nginx/error.log;
# error_log /var/log/nginx/error.debug.log debug;

# ----------------------------------------------------------------------------------------------------------------------
# HTTP
# ----------------------------------------------------------------------------------------------------------------------

http {
    include         /etc/nginx/mime.types;
    default_type    application/octet-stream;

    # не показывать версию nginx на страницах ошибок и в поле “Server” заголовка ответа
    server_tokens off;

    # ------------------------------------------------------------------------------------------------------------------
    # Access Logs
    # ------------------------------------------------------------------------------------------------------------------

    # Кривая по смыслу карта, учитывая, что это access-логи,
    # но это специально для loki, чтоб удобно было фильтровать аналогично прочим логам.
    map $status $loki_level {
        ~^(2|3|422) info;
        ~^4         warn;
        ~^5         error;
        default     unknown;
    }
    log_format alf_loki escape=json '{'
        '"time_local":"$time_local",'
        '"level": "$loki_level",'
        '"status": "$status",'
        '"request":"$request",'
        '"trace_id":"$request_id",'
        '"request_time":"$request_time",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_cache_status":"$upstream_cache_status",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"remote_addr":"$remote_addr",'
        '"http_user_agent":"$http_user_agent",'
        '"body_bytes_sent":"$body_bytes_sent"'
    '}';

    # см. build/metrics-exporter/config.yml
    log_format alf_prometheus
        '$time_local|||'
        '$remote_addr|||'
        '$remote_user|||'
        '$request|||'
        '$status|||'
        '$body_bytes_sent|||'
        '$http_referer|||'
        '$http_user_agent|||'
        '$request_length|||'
        '$request_time|||'
        '$upstream_addr|||'
        '$upstream_status|||'
        '$upstream_cache_status|||'
        '$upstream_connect_time|||'
        '$upstream_header_time|||'
        '$upstream_response_time';

    access_log  /var/log/nginx/access.loki.log          alf_loki;
    access_log  /var/log/nginx/access.prometheus.log    alf_prometheus;

    # ------------------------------------------------------------------------------------------------------------------
    # Proxy Cache
    # ------------------------------------------------------------------------------------------------------------------

    proxy_cache_path
        /var/cache/nginx/bff_static levels=1:2
        # памяти для хранения ключей кеша
        keys_zone=bff_static:10m
        # максимальный объём кеша на диске
        max_size=90m
        # файлы удаляются из кеша, если не использовались столько-то времени
        inactive=60m
        # Кэшированный ответ сначала записывается во временный файл, а затем этот файл переименовывается.
        # Если значение установлено в off, временные файлы будут помещены непосредственно в каталог кэша.
        use_temp_path=off;

    # ------------------------------------------------------------------------------------------------------------------
    # Server
    # ------------------------------------------------------------------------------------------------------------------

    server {
        listen 80 default_server;

        # Статика
        # --------------------------------------------------------------------------------------------------------------

        root /var/www/static;

        location = /favicon.ico {
            access_log off;
        }
        location = /robots.txt {
            access_log off;
        }

        # `rproxy` кеширует файлы, полученные из `bff` -- cм. README.md.

        # ~* -- не зависит от регистра
        # (\?.*)? -- разрешает параметры урла
        location ~* ^/static/.+\.(js|css)(\?.*)?$ {
            access_log off;

            limit_except GET HEAD {
                deny all;
            }

            proxy_pass __BFF_PROXY_PASS__;

            # Кеширование в nginx
            # --------------------------------
            proxy_cache bff_static;
            proxy_cache_key $scheme$proxy_host$request_uri; # по умолчанию

            # длительность кеширования выставлена примерная
            proxy_cache_valid 200 301 302   60m;
            proxy_cache_valid 404           10m;
            proxy_cache_valid any           10m;

            # Кеширование на клиенте
            # --------------------------------

            # - max-age=<seconds>   -- время жизни кеша в секундах;
            # - public              -- можно кешировать на прокси и в браузере;
            # - private             -- кешировать только в браузере клиента;
            # - no-cache            -- перед отдачей проверить актуальность у бэкенда;
            # - no-store            -- не кешировать вообще;
            # - must-revalidate     -- строго соблюдать max-age, не отдавать устаревшее;
            # - immutable           -- контент не изменится, пока не протухнет по max-age.

            # Длительность кеширования выставлена примерная
            add_header Cache-Control "private, immutable, max-age=3600";
        }

        # Динамика
        # --------------------------------------------------------------------------------------------------------------

        location / {
            set $trace_id $request_id;
            proxy_set_header X-Trace-Id $trace_id;

            proxy_set_header X-Real-Host $host;
            proxy_set_header X-Real-Ip $remote_addr;
            proxy_set_header X-Real-UserAgent $http_user_agent;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass __BFF_PROXY_PASS__;

            proxy_cache off;
        }

        # --------------------------------------------------------------------------------------------------------------
    }
}
