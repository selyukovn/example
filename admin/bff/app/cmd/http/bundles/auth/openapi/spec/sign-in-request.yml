post:
  security:
    - sessId: [ ]

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            email:
              type: string
              format: some@email.com

  responses:
    "200":
      description: success
      content:
        application/json:
          schema:
            type: object
            properties:
              sign_in_id:
                type: string
                example: bc2d0f53-5041-46e8-a14c-267875a49f0c
              retries_left:
                type: integer
              can_retry_at:
                type: string
                format: 2006-01-02T15:04:05Z07:00
                example: 2006-01-02T15:04:05Z07:00
              expire_at:
                type: string
                format: 2006-01-02T15:04:05Z07:00
                example: 2006-01-02T15:04:05Z07:00
    "422":
      $ref: "./common/expected-error.yml"
