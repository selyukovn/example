<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ .AppName }} - Посторонним В.</title>
    <link rel="stylesheet" href="{{ .StaticBaseUrl }}/sign_in_welcome.css"/>
</head>
<body>
<div class="container">
    <h2>Посторонним В.</h2>

    <div id="email-step">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <button id="email-step-continue-button" type="button">Продолжить</button>
    </div>

    <div id="code-step" style="display: none;">
        <div class="form-group">
            <label for="code">Введите код подтверждения (6 цифр)</label>
            <input type="text" id="code" name="code" maxlength="6" required>
        </div>
        <button id="confirm-button" type="button">Подтвердить</button>
        <div id="expire-at" class="expire-at"></div>
        <a href="#" class="resend-link" id="resend-link" style="display: none;">
            Отправить еще раз
        </a>
    </div>

    <div id="error" class="error"></div>

    <a href="#" class="reload-link" id="reload-link" style="display: none;">
        Начать заново
    </a>
</div>

<script>
    const PAGE_SETTINGS_UrlSignInRequest="{{ .UrlSignInRequest }}";
    const PAGE_SETTINGS_UrlSignInRequestRetry="{{ .UrlSignInRequestRetry }}";
    const PAGE_SETTINGS_UrlSignInConfirm="{{ .UrlSignInConfirm }}";
</script>
<script src="{{ .StaticBaseUrl }}/sign_in_welcome.js"></script>
</body>
</html>
