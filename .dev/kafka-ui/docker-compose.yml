name: example

services:
  dev-tools-kafka-ui:
    user: "${DEPLOY_CONTAINER_USER_UID}:${DEPLOY_CONTAINER_USER_GID}"
    build:
      context: ./
      dockerfile: Dockerfile
    environment:
      KAFKA_CLUSTERS_0_NAME: ${INFRASTRUCTURE_KAFKA_CLUSTER_ID}
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: ${INFRASTRUCTURE_KAFKA_BROKERS}
    networks:
      - infrastructure-kafka-network
    # ports:
    #   - 127.0.0.1:8003:8080
    depends_on:
      infrastructure-kafka-server-a:
        condition: service_healthy
      infrastructure-kafka-server-b:
        condition: service_healthy
      infrastructure-kafka-server-c:
        condition: service_healthy
