name: example

x-prototypes:
  # go
  dev-tools-go-general: &dev-tools-go-general
    user: "${DEPLOY_CONTAINER_USER_UID}:${DEPLOY_CONTAINER_USER_GID}"
    develop:
      watch:
        - action: rebuild
          path: ./go/
  dev-tools-go-build: &dev-tools-go-build
    context: ./go
    dockerfile: Dockerfile

# ----------------------------------------------------------------------------------------------------------------------

services:
  # --------------------------------------------------------------------------------------------------------------------
  # Admin - Auth
  # --------------------------------------------------------------------------------------------------------------------

  dev-tools-admin-auth:
    << : *dev-tools-go-general
    build:
      << : *dev-tools-go-build
      args:
        GRPC_API_SERVICE_NAME: auth
    volumes:
      - ../../admin/auth/app:/app

  # --------------------------------------------------------------------------------------------------------------------
  # Admin - BFF
  # --------------------------------------------------------------------------------------------------------------------

  dev-tools-admin-bff:
    << : *dev-tools-go-general
    build:
      << : *dev-tools-go-build
      args:
        GRPC_API_SERVICE_NAME: bff
    volumes:
      - ../../admin/bff/app:/app

  # --------------------------------------------------------------------------------------------------------------------
  # Admin - Cfm
  # --------------------------------------------------------------------------------------------------------------------

  dev-tools-admin-cfm:
    << : *dev-tools-go-general
    build:
      << : *dev-tools-go-build
      args:
        GRPC_API_SERVICE_NAME: cfm
    volumes:
      - ../../admin/cfm/app:/app

  # --------------------------------------------------------------------------------------------------------------------
